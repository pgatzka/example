name: Deploy

run-name: >
  ${{ github.workflow }}: ${{ github.event_name }} for ${{ github.ref_name }} by @${{ github.actor }} on ${{ inputs.environment }}

on:
  # Trigger 1: manual run from the Actions UI
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag to deploy (latest, snapshot, or sha-xxxxxxx)"
        type: string
        required: true
        default: latest
      environment:
        description: "Target environment"
        type: choice
        required: true
        options: [ci, production]
        default: ci

  # Trigger 2: called from another workflow
  workflow_call:
    inputs:
      image_tag:
        description: "Image tag to deploy (latest, snapshot, or sha-xxxxxxx)"
        type: string
        required: true
        default: latest
      environment:
        description: "Target environment"
        type: string
        required: true
        default: ci

permissions:
  contents: read
  packages: read   # needed to pull from GHCR

jobs:
  deploy:
    # The runner lives on the deployment host. Label your runners with the
    # environment name (e.g. add label "ci" or "production").
    runs-on: [self-hosted, "${{ inputs.environment }}"]

    # Binds a GitHub Environment -> per-env vars/secrets + optional approvals.
    environment: ${{ inputs.environment }}

    # Never let two deploys to the same environment overlap.
    concurrency:
      group: deploy-${{ inputs.environment }}
      cancel-in-progress: false

    steps:
      # Shallow checkout just to get a working git repo; we fetch the exact
      # revisions we need on demand below.
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Deploy
        env:
          IMAGE: ${{ vars.IMAGE_NAME || format('ghcr.io/{0}', github.repository) }}
          TAG: ${{ inputs.image_tag }}
          TRIGGER_SHA: ${{ github.sha }}
          SERVICE: ${{ vars.COMPOSE_SERVICE || 'app' }}
          COMPOSE_PROJECT_NAME: ${{ vars.COMPOSE_PROJECT_NAME }}
          COMPOSE_FILE: ${{ vars.COMPOSE_FILE || format('compose.yaml:compose.{0}.yaml', inputs.environment) }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}   # lets the script fetch compose files from a private repo
          DEPLOYMENT_DIRECTORY: ${{ vars.DEPLOYMENT_DIRECTORY }}   # per-env history location (required)
          KEEP_RELEASES: ${{ vars.KEEP_RELEASES }}
          HOST_PORT: ${{ vars.HOST_PORT || '8080' }}   # available for ${HOST_PORT} interpolation in compose
          HEALTH_TIMEOUT: ${{ vars.HEALTH_TIMEOUT }}
          HEALTH_INTERVAL: ${{ vars.HEALTH_INTERVAL }}
        run: .github/scripts/deploy.sh


      - name: Log out of GHCR
        if: always()
        run: docker logout ghcr.io