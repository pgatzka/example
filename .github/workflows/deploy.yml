name: Deploy

run-name: >
  ${{ github.workflow }}: ${{ github.event_name }} for ${{ github.ref_name }} by @${{ github.actor }} on ${{ inputs.environment }}

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag to deploy (latest, snapshot, or sha-xxxxxxx)"
        type: string
        required: true
        default: latest
      environment:
        description: "Target environment"
        type: choice
        required: true
        options: [ ci, production ]
        default: ci
  workflow_call:
    inputs:
      image_tag:
        description: "Image tag to deploy (latest, snapshot, or sha-xxxxxxx)"
        type: string
        required: true
        default: latest
      environment:
        description: "Target environment"
        type: string
        required: true
        default: ci

permissions:
  contents: read
  packages: read

jobs:
  deploy:
    runs-on: [ self-hosted, "${{ inputs.environment }}" ]
    environment: ${{ inputs.environment }}
    concurrency:
      group: deploy-${{ inputs.environment }}
      cancel-in-progress: false
    steps:
      - name: Check out repo
        uses: actions/checkout@v4
      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
      - name: Deploy
        env:
          # Image repository to pull from. Defaults to ghcr.io/<owner>/<repo>;
          # override with the IMAGE_NAME variable if the image name differs.
          IMAGE: ${{ vars.IMAGE_NAME || format('ghcr.io/{0}', github.repository) }}
          # Tag to deploy: latest, snapshot, or a specific sha-xxxxxxx.
          TAG: ${{ inputs.image_tag }}
          # Commit that triggered the run; used as the compose-file revision
          # only if the image carries no org.opencontainers.image.revision label.
          TRIGGER_SHA: ${{ github.sha }}
          # Name of the compose service to deploy and health-check.
          SERVICE: ${{ vars.COMPOSE_SERVICE }}
          # Compose project (stack) name. Isolates this stack and is the label
          # used to find the running container for rollback. Distinct per env.
          COMPOSE_PROJECT_NAME: ${{ vars.COMPOSE_PROJECT_NAME }}
          # Colon-separated repo-relative compose file paths (base + overrides).
          COMPOSE_FILE: ${{ vars.COMPOSE_FILE }}
          # Token used to fetch the compose files from the repo (private-repo safe).
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Persistent per-environment directory holding the release history.
          DEPLOYMENT_DIRECTORY: ${{ vars.DEPLOYMENT_DIRECTORY }}
          # How many past releases to keep on disk before pruning.
          KEEP_RELEASES: ${{ vars.KEEP_RELEASES }}
          # Host port for the app; available for ${HOST_PORT} interpolation in compose.
          HOST_PORT: ${{ vars.HOST_PORT }}
          # Seconds to wait for the container to report Docker "healthy".
          HEALTH_TIMEOUT: ${{ vars.HEALTH_TIMEOUT }}
          # Seconds between health-status polls.
          HEALTH_INTERVAL: ${{ vars.HEALTH_INTERVAL }}
        run: .github/scripts/deploy.sh
      - name: Log out of GHCR
        if: always()
        run: docker logout ghcr.io